<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang chuyển hướng...</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; color: #333; text-align: center; padding-top: 100px; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #EE4D2D; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Đang kiểm tra liên kết...</h2>
  <p id="msg">Vui lòng đợi giây lát.</p>

  <script>
    (function() {
      var pathStr = window.location.pathname.substring(1).replace(/\/$/, "");
      var spinner = document.querySelector(".spinner");
      var title = document.querySelector("h2");
      var msg = document.getElementById("msg");

      function showErr() {
        spinner.style.display = "none";
        title.innerHTML = "❌ Lỗi 404";
        msg.innerHTML = "Liên kết không tồn tại hoặc đã bị xóa.<br><br><a href='/' style='color:#0a6ebd;text-decoration:none;font-weight:bold;'>← Quay về Trang chủ</a>";
      }

      if (pathStr.length === 10) {
        var project = "shopeeafff-bfd62";
        // Dùng thẳng REST API thay cho việc tải toàn bộ 300KB thư viện Firebase SDK
        var docUrl = "https://firestore.googleapis.com/v1/projects/" + project + "/databases/(default)/documents/shortlinks/" + pathStr;
        
        // 1. Tải URL đích (Nhẹ và nhanh nhất có thể)
        fetch(docUrl).then(function(res) {
          if (!res.ok) throw new Error("Not found");
          return res.json();
        }).then(function(data) {
          var targetUrl = "";
          if (data && data.fields && data.fields.url && data.fields.url.stringValue) {
            targetUrl = data.fields.url.stringValue;
          }
          
          if (targetUrl) {
            // 2. Gửi request cộng click ngầm phía background (dùng keepalive không cản trở việc chuyển trang)
            var commitUrl = "https://firestore.googleapis.com/v1/projects/" + project + "/databases/(default)/documents:commit";
            fetch(commitUrl, {
              method: "POST",
              keepalive: true,
              body: JSON.stringify({
                writes: [{
                  transform: {
                    document: "projects/" + project + "/databases/(default)/documents/shortlinks/" + pathStr,
                    fieldTransforms: [{ fieldPath: "clicks", increment: { integerValue: "1" } }]
                  }
                }]
              })
            }).catch(function(){});

            // 3. Đá sang link mới ngay lập tức. Dùng replace để triệt tiêu trang 404 khỏi lịch sử back của trình duyệt.
            window.location.replace(targetUrl);
          } else {
            showErr();
          }
        }).catch(function(e) {
          showErr();
        });
      } else {
        showErr();
      }
    })();
  </script>
</body>
</html>
