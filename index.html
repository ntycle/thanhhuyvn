<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tra cứu đơn hàng Shopee</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #EE4D2D; --orange-dark: #c73e24;
      --blue: #0a6ebd; --green: #0abd50;
      --bg: #f5f5f5; --text: #333; --text-light: #777;
      --border: #e0e0e0;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* AUTH */
    #auth-screen {
      min-height: 100vh;
      background: linear-gradient(135deg, #EE4D2D 0%, #ff8c00 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .auth-card { background: white; border-radius: 16px; box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; overflow: hidden; }
    .auth-top { background: linear-gradient(135deg, #EE4D2D, #ff6b4a); color: white; padding: 28px 32px 22px; text-align: center; }
    .auth-top .logo { font-size: 38px; margin-bottom: 6px; }
    .auth-top h2 { font-size: 19px; font-weight: 700; }
    .auth-top p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .auth-tab {
      flex: 1; padding: 13px; text-align: center; font-size: 14px; font-weight: 600;
      cursor: pointer; color: var(--text-light); border: none; border-bottom: 3px solid transparent;
      background: none; font-family: inherit; transition: all 0.2s;
    }
    .auth-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
    .auth-body { padding: 22px 28px 26px; }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .fg input {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .fg input:focus { border-color: var(--orange); }
    .btn-main {
      width: 100%; background: var(--orange); color: white; border: none;
      padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn-main:hover { background: var(--orange-dark); }
    .amsg { font-size: 13px; padding: 10px 12px; border-radius: 7px; margin-top: 12px; display: none; }
    .amsg.err { background: #fff0ee; color: #c00; border: 1px solid #ffc5bb; display: block; }
    .amsg.ok  { background: #edfff4; color: #0a7a32; border: 1px solid #b3f0cc; display: block; }

    /* HEADER */
    #app-screen { display: none; }
    .header {
      background: var(--orange); color: white; padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(238,77,45,0.3); position: sticky; top: 0; z-index: 100;
    }
    .header-logo { font-size: 19px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .header-right .uname { font-weight: 600; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-out {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 5px 14px; border-radius: 20px; font-size: 13px;
      cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    .btn-out:hover { background: rgba(255,255,255,0.35); }

    /* TAB NAV */
    .tab-nav {
      background: white; border-bottom: 1px solid var(--border);
      display: flex; padding: 0 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .tab-nav button {
      padding: 14px 20px; font-size: 14px; font-weight: 600; font-family: inherit;
      border: none; background: none; cursor: pointer; color: var(--text-light);
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .tab-nav button.active { color: var(--orange); border-bottom-color: var(--orange); }

    .container { max-width: 1400px; margin: 0 auto; padding: 22px 20px; }

    .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 18px; }
    .card-title { font-size: 15px; font-weight: 700; color: var(--blue); margin-bottom: 14px; }

    .guide-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .guide-links a {
      color: var(--blue); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 4px 10px; border: 1px solid var(--blue); border-radius: 20px; transition: all 0.2s;
    }
    .guide-links a:hover { background: var(--blue); color: white; }

    textarea {
      width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; resize: vertical; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--orange); }
    .btn-search {
      width: 100%; background: var(--green); color: white; border: none; padding: 12px;
      border-radius: 8px; font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: 10px; transition: background 0.2s;
    }
    .btn-search:hover { background: #09a344; }
    .btn-search:disabled { background: #aaa; cursor: not-allowed; }

    /* TABLE */
    .result-wrap { overflow-x: auto; width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
    th { background: var(--blue); color: white; padding: 9px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
    td { border-bottom: 1px solid var(--border); padding: 9px 12px; vertical-align: middle; }
    td.col-name { max-width: 220px; }
    td.col-name span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; cursor: default; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f9f9f9; }
    tfoot td { font-weight: 700; background: #e8f4ff; color: var(--blue); }
    @media (max-width: 900px) { td.col-name { max-width: 150px; } td.col-name span { max-width: 150px; } }

    /* CLAIM STATES */
    .btn-claim {
      background: var(--orange); color: white; border: none;
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .btn-claim:hover { background: var(--orange-dark); }
    .btn-claim:disabled { background: #ccc; cursor: not-allowed; }
    .tag-mine   { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .tag-other  { display: inline-block; background: #fff3e0; color: #e65100; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .tag-paid   { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .tag-unpaid { display: inline-block; background: #fff3e0; color: #c75000; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .tag-nopay  { display: inline-block; background: #f3f3f3; color: #999;    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }

    .not-found { background: white; border-radius: var(--radius); padding: 24px; text-align: center; box-shadow: var(--shadow); color: #c00; font-weight: 600; }

    /* MY ORDERS */
    .summary-bar {
      background: linear-gradient(135deg, #EE4D2D, #ff8c00); color: white;
      border-radius: var(--radius); padding: 18px 22px; margin-bottom: 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .summary-bar h3 { font-size: 17px; font-weight: 700; }
    .summary-bar p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .summary-stats { display: flex; gap: 22px; }
    .stat-box .val { font-size: 22px; font-weight: 700; }
    .stat-box .lbl { font-size: 11px; opacity: 0.8; }

    .btn-unclaim {
      background: none; border: 1px solid #e53935; color: #e53935;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .btn-unclaim:hover { background: #e53935; color: white; }

    .spinner-wrap { text-align: center; padding: 32px; color: var(--text-light); font-size: 14px; }
    .spinner { display: inline-block; width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 8px; display: block; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .auth-body { padding: 18px; }
      .tab-nav button { padding: 12px 14px; font-size: 13px; }
      .summary-stats { gap: 14px; }
      .container { padding: 14px 10px; }
      .summary-bar { padding: 14px 16px; }
    }
    @media (max-width: 480px) {
      .tab-nav button { padding: 10px 10px; font-size: 12px; }
      .summary-stats { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-top">
      <div class="logo">🛍️</div>
      <h2>Tra cứu đơn hàng Shopee</h2>
      <p>Đăng nhập để tìm và quản lý đơn hàng của bạn</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Đăng nhập</button>
      <button class="auth-tab" onclick="switchTab('register')">Đăng ký</button>
    </div>
    <div class="auth-body">
      <div id="tab-login">
        <div class="fg"><label>Email</label><input type="email" id="login-email" placeholder="email@example.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div class="fg"><label>Mật khẩu</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <button class="btn-main" onclick="doLogin()">Đăng nhập</button>
        <div id="login-msg" class="amsg"></div>
      </div>
      <div id="tab-register" style="display:none">
        <div class="fg"><label>Họ tên</label><input type="text" id="reg-name" placeholder="Nguyễn Văn A"/></div>
        <div class="fg"><label>Email</label><input type="email" id="reg-email" placeholder="email@example.com"/></div>
        <div class="fg"><label>Mật khẩu</label><input type="password" id="reg-pass" placeholder="Ít nhất 6 ký tự"/></div>
        <button class="btn-main" onclick="doRegister()">Đăng ký tài khoản</button>
        <div id="reg-msg" class="amsg"></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="header">
    <div class="header-logo">🛍️ Shopee Affiliate</div>
    <div class="header-right">
      <span class="uname" id="header-uname"></span>
      <button class="btn-out" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="active" id="nav-search" onclick="showMainTab('search')">🔍 Tìm đơn hàng</button>
    <button id="nav-mine" onclick="showMainTab('mine')">📦 Đơn của tôi <span id="mine-badge"></span></button>
  </div>

  <div class="container">
    <!-- SEARCH TAB -->
    <div id="main-search">
      <div class="card">
        <div class="card-title">🔍 Tìm kiếm đơn hàng</div>
        <div class="guide-links">
          <a href="https://s.shopee.vn/2g0gyIajUG" target="_blank">🎟️ Mã giảm giá Shopee</a>
          <a href="https://shorten.asia/mTn3wHfD" target="_blank">☕ Mã Highland Coffee</a>
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfIpQPRF5WcU8vNis5O9Gx0Rej3ekZ1XmXQn0BNIq74bMovpA/viewform" target="_blank">💳 Thông tin thanh toán</a>
        </div>
        <textarea id="orderId" rows="3" placeholder="Nhập ID đơn hàng, cách nhau bằng dấu phẩy hoặc xuống dòng&#10;VD: 250601E7EMYD4X, 250602ABCDE12F"></textarea>
        <button class="btn-search" id="btn-search" onclick="doSearch()">🔍 Tìm đơn hàng</button>
      </div>
      <div id="search-result"></div>
    </div>

    <!-- MY ORDERS TAB -->
    <div id="main-mine" style="display:none">
      <div class="summary-bar">
        <div>
          <h3>Xin chào, <span id="welcome-name"></span>! 👋</h3>
          <p>Các đơn hàng đã được gán về tài khoản của bạn</p>
        </div>
        <div class="summary-stats">
          <div class="stat-box"><div class="val" id="sum-count">0</div><div class="lbl">Đơn hàng</div></div>
          <div class="stat-box"><div class="val" id="sum-value">0₫</div><div class="lbl">Tổng giá trị</div></div>
          <div class="stat-box"><div class="val" id="sum-disc">0₫</div><div class="lbl">Chiết khấu</div></div>
        </div>
      </div>
      <div class="card" style="padding:0">
        <div id="mine-list"><div class="spinner-wrap"><div class="spinner"></div>Đang tải...</div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, query, where, getDocs,
  serverTimestamp, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyCD3bS8LTPnXU-9C0xVTRC-IzYfPe428x8",
  authDomain: "shopeeafff-bfd62.firebaseapp.com",
  projectId: "shopeeafff-bfd62",
  storageBucket: "shopeeafff-bfd62.firebasestorage.app",
  messagingSenderId: "1091380862349",
  appId: "1:1091380862349:web:1c82d576edc1888e4a31c4"
};
const app = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

// Các field bị ẩn khỏi bảng
const EXCLUDE = new Set(["Hoa hồng Shopee trên sản phẩm(₫)", "userId", "createdAt", "updatedAt", "claimedAt", "_id", "thanhToan"]);

// Thứ tự cột cố định hiển thị cho user
const COL_ORDER = [
  "ID đơn hàng",
  "Thời gian Click",
  "Thời Gian Đặt Hàng",
  "Tên Item",
  "Giá trị đơn hàng (₫)",
  "Chiết Khấu",
  "Trạng thái đặt hàng",
];

let me = null, myName = "", myOrders = [];

// ─── AUTH STATE ───────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    me = user.uid;
    const snap = await getDoc(doc(db, "users", user.uid));
    myName = snap.exists() ? snap.data().name : user.email;
    document.getElementById("header-uname").textContent  = myName;
    document.getElementById("welcome-name").textContent  = myName;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app-screen").style.display  = "block";
    await refreshMyOrders();
  } else {
    me = null;
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app-screen").style.display  = "none";
  }
});

// ─── MY ORDERS ────────────────────────────────────────────
async function refreshMyOrders() {
  const q    = query(collection(db, "orders"), where("userId", "==", me));
  const snap = await getDocs(q);
  myOrders   = snap.docs.map(d => ({ _id: d.id, ...d.data() }));

  const count = myOrders.length;
  document.getElementById("mine-badge").textContent = count > 0 ? `(${count})` : "";

  let totalVal = 0, totalDisc = 0;
  myOrders.forEach(o => {
    totalVal  += Number(o["Giá trị đơn hàng (₫)"]) || 0;
    totalDisc += calcDisc(o);
  });
  document.getElementById("sum-count").textContent = count;
  document.getElementById("sum-value").textContent  = (totalVal/1e6).toFixed(2) + "M₫";
  document.getElementById("sum-disc").textContent   = totalDisc.toLocaleString("vi-VN") + "₫";

  renderMyOrders();
}

function calcDisc(o) {
  const hh = Number((o["Hoa hồng Shopee trên sản phẩm(₫)"] || "0").toString().replace(/\./g,"")) || 0;
  const ck = Number(o["Chiết Khấu 2%"]) || 0;
  return hh === 0 ? 0 : Math.min(ck, 20000);
}

// Trả về danh sách cột theo thứ tự cố định, chỉ lấy các cột có tồn tại trong dữ liệu
function getOrderedHeaders(order) {
  const available = new Set(Object.keys(order));
  const cols = COL_ORDER.filter(c => available.has(c));
  // Thêm các cột khác chưa được liệt kê (trừ EXCLUDE)
  Object.keys(order).forEach(k => {
    if (!EXCLUDE.has(k) && !cols.includes(k)) cols.push(k);
  });
  return cols;
}

function paymentBadge(val) {
  if (val === "Đã Thanh Toán")   return `<span class="tag-paid">💚 Đã Thanh Toán</span>`;
  if (val === "Chưa Thanh Toán") return `<span class="tag-unpaid">🟡 Chưa Thanh Toán</span>`;
  return `<span class="tag-nopay">–</span>`;
}

function renderMyOrders() {
  const el = document.getElementById("mine-list");
  if (!myOrders.length) {
    el.innerHTML = `<div style="padding:36px;text-align:center;color:#999;font-size:14px">
      Chưa có đơn hàng nào.<br>Hãy sang tab <b>🔍 Tìm đơn hàng</b> để tìm và gán đơn về tài khoản!
    </div>`;
    return;
  }
  const headers = getOrderedHeaders(myOrders[0]);
  let totalVal = 0, totalDisc = 0;

  const rows = myOrders.map(o => {
    const val  = Number(o["Giá trị đơn hàng (₫)"]) || 0;
    const disc = calcDisc(o);
    totalVal += val; totalDisc += disc;
    return `<tr>
      ${headers.map(h => {
        if (h === "Giá trị đơn hàng (₫)") return `<td>${val.toLocaleString("vi-VN")}</td>`;
        if (h === "Chiết Khấu" || h === "Chiết Khấu 2%") return `<td>${disc.toLocaleString("vi-VN")}</td>`;
        if (h === "Tên Item") {
          const full = o[h] ?? "";
          const short = full.length > 50 ? full.slice(0, 50) + "\u2026" : full;
          return `<td class="col-name"><span title="${full.replace(/"/g,'&quot;')}">${short}</span></td>`;
        }
        return `<td>${o[h] ?? ""}</td>`;
      }).join("")}
      <td>${paymentBadge(o.thanhToan)}</td>
      <td><button class="btn-unclaim" onclick="unclaimOrder('${o._id}')">✕ Bỏ gán</button></td>
    </tr>`;
  }).join("");

  el.innerHTML = `<div class="result-wrap"><table>
    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}<th>Thanh toán</th><th>Thao tác</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr>${headers.map(h => {
      if (h === "Giá trị đơn hàng (₫)") return `<td>${totalVal.toLocaleString("vi-VN")}</td>`;
      if (h === "Chiết Khấu" || h === "Chiết Khấu 2%") return `<td>${totalDisc.toLocaleString("vi-VN")}</td>`;
      return `<td>${h === headers[0] ? "TỔNG" : ""}</td>`;
    }).join("")}<td></td><td></td></tr></tfoot>
  </table></div>`;
}

// ─── SEARCH ──────────────────────────────────────────────
window.doSearch = async function() {
  const raw = document.getElementById("orderId").value;
  const ids = raw.toUpperCase().split(/[\s,]+/).filter(Boolean);
  const resultDiv = document.getElementById("search-result");
  if (!ids.length) return;

  const btn = document.getElementById("btn-search");
  btn.disabled = true; btn.textContent = "⏳ Đang tìm...";
  resultDiv.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div>Đang tìm kiếm trong hệ thống...</div>`;

  try {
    // Firestore 'in' allows max 30 per query — chunk if needed
    let found = [];
    for (let i = 0; i < ids.length; i += 30) {
      const chunk = ids.slice(i, i + 30);
      // Query by document ID (orderID is used as doc ID by admin upload)
      // Try querying by field first; if permission error try doc IDs
      try {
        const snap = await getDocs(query(collection(db, "orders"), where("ID đơn hàng", "in", chunk)));
        snap.docs.forEach(d => found.push({ _id: d.id, ...d.data() }));
      } catch(qErr) {
        if (qErr.code === "permission-denied") {
          // Fallback: try fetching by document ID directly
          const promises = chunk.map(id => getDoc(doc(db, "orders", id)));
          const snaps = await Promise.all(promises);
          snaps.forEach(s => { if (s.exists()) found.push({ _id: s.id, ...s.data() }); });
        } else throw qErr;
      }
    }

    if (!found.length) {
      resultDiv.innerHTML = `<div class="not-found">❌ Không tìm thấy đơn hàng nào khớp với: <b>${ids.join(", ")}</b></div>`;
      return;
    }
    renderSearchResults(found, resultDiv);
  } catch(e) {
    const hint = e.code === "permission-denied"
      ? `<br><small>💡 Lỗi quyền truy cập – liên hệ admin để cập nhật Firestore Security Rules.</small>`
      : "";
    resultDiv.innerHTML = `<div class="not-found">❌ Lỗi: ${e.message}${hint}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "🔍 Tìm đơn hàng";
  }
};

function renderSearchResults(orders, container) {
  const headers = getOrderedHeaders(orders[0]);
  let totalVal = 0, totalDisc = 0;

  const rows = orders.map(o => {
    const val  = Number(o["Giá trị đơn hàng (₫)"]) || 0;
    const disc = calcDisc(o);
    totalVal += val; totalDisc += disc;

    const isMine    = o.userId === me;
    const isClaimed = !!o.userId;
    const actionCell = isMine
      ? `<td><span class="tag-mine">✅ Của tôi</span></td>`
      : isClaimed
        ? `<td><span class="tag-other">🔒 Đã gán</span></td>`
        : `<td><button class="btn-claim" onclick="claimOrder('${o._id}', this)">📌 Gán cho tôi</button></td>`;

    return `<tr>
      ${headers.map(h => {
        if (h === "Giá trị đơn hàng (₫)") return `<td>${val.toLocaleString("vi-VN")}</td>`;
        if (h === "Chiết Khấu" || h === "Chiết Khấu 2%") return `<td>${disc.toLocaleString("vi-VN")}</td>`;
        if (h === "Tên Item") {
          const full = o[h] ?? "";
          const short = full.length > 50 ? full.slice(0, 50) + "\u2026" : full;
          return `<td class="col-name"><span title="${full.replace(/"/g,'&quot;')}">${short}</span></td>`;
        }
        return `<td>${o[h] ?? ""}</td>`;
      }).join("")}
      <td>${paymentBadge(o.thanhToan)}</td>
      ${actionCell}
    </tr>`;
  }).join("");

  container.innerHTML = `<div class="card" style="padding:0"><div class="result-wrap"><table>
    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}<th>Thanh toán</th><th>Trạng thái</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr>${headers.map(h => {
      if (h === "Giá trị đơn hàng (₫)") return `<td>${totalVal.toLocaleString("vi-VN")}</td>`;
      if (h === "Chiết Khấu" || h === "Chiết Khấu 2%") return `<td>${totalDisc.toLocaleString("vi-VN")}</td>`;
      return `<td>${h === headers[0] ? "TỔNG" : ""}</td>`;
    }).join("")}<td></td><td></td></tr></tfoot>
  </table></div></div>`;
}

// ─── CLAIM ───────────────────────────────────────────────
window.claimOrder = async function(docId, btn) {
  btn.disabled = true; btn.textContent = "⏳...";
  try {
    await runTransaction(db, async (tx) => {
      const ref  = doc(db, "orders", docId);
      const snap = await tx.get(ref);
      if (!snap.exists())    throw new Error("Đơn hàng không tồn tại.");
      if (snap.data().userId) throw new Error("TAKEN");
      tx.update(ref, { userId: me, claimedAt: serverTimestamp() });
    });
    btn.closest("td").innerHTML = `<span class="tag-mine">✅ Của tôi</span>`;
    await refreshMyOrders();
  } catch(e) {
    if (e.message === "TAKEN") {
      btn.closest("td").innerHTML = `<span class="tag-other">🔒 Đã gán</span>`;
    } else {
      btn.disabled = false; btn.textContent = "📌 Gán cho tôi";
      alert("Lỗi: " + e.message);
    }
  }
};

// ─── UNCLAIM ─────────────────────────────────────────────
window.unclaimOrder = async function(docId) {
  if (!confirm("Bỏ gán đơn hàng này khỏi tài khoản của bạn?")) return;
  try {
    await updateDoc(doc(db, "orders", docId), { userId: null, claimedAt: null });
    await refreshMyOrders();
  } catch(e) { alert("Lỗi: " + e.message); }
};

// ─── NAV TABS ─────────────────────────────────────────────
window.showMainTab = function(tab) {
  document.getElementById("main-search").style.display = tab === "search" ? "block" : "none";
  document.getElementById("main-mine").style.display   = tab === "mine"   ? "block" : "none";
  document.getElementById("nav-search").classList.toggle("active", tab === "search");
  document.getElementById("nav-mine").classList.toggle("active",   tab === "mine");
};

window.switchTab = function(tab) {
  document.getElementById("tab-login").style.display    = tab === "login"    ? "block" : "none";
  document.getElementById("tab-register").style.display = tab === "register" ? "block" : "none";
  document.querySelectorAll(".auth-tab").forEach((el, i) =>
    el.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1))
  );
};

// ─── AUTH ACTIONS ─────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  const msg   = document.getElementById("login-msg");
  msg.className = "amsg";
  if (!email || !pass) { msg.className = "amsg err"; msg.textContent = "Vui lòng nhập đầy đủ."; return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    msg.className = "amsg err";
    msg.textContent = e.code === "auth/invalid-credential" ? "❌ Email hoặc mật khẩu không đúng." : "❌ " + e.message;
  }
};

window.doRegister = async function() {
  const name  = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pass  = document.getElementById("reg-pass").value;
  const msg   = document.getElementById("reg-msg");
  msg.className = "amsg";
  if (!name || !email || !pass) { msg.className = "amsg err"; msg.textContent = "Vui lòng nhập đầy đủ."; return; }
  if (pass.length < 6)          { msg.className = "amsg err"; msg.textContent = "Mật khẩu phải ít nhất 6 ký tự."; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, "users", cred.user.uid), { name, email, role: "user", createdAt: serverTimestamp() });
    msg.className = "amsg ok"; msg.textContent = "✅ Đăng ký thành công!";
  } catch(e) {
    msg.className = "amsg err";
    msg.textContent = e.code === "auth/email-already-in-use" ? "❌ Email đã được dùng." : "❌ " + e.message;
  }
};

window.doLogout = async function() {
  await signOut(auth);
  document.getElementById("search-result").innerHTML = "";
  document.getElementById("orderId").value = "";
};
</script>
